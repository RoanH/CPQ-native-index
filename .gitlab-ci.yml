image: eclipse-temurin:25

variables:
  SUFFIX: ${CI_PIPELINE_ID}-${CI_COMMIT_REF_NAME}
  PROJECTNAME: CPQ-native Index

before_script:
  - java -version
  - cd "${PROJECTNAME}"
  - ls -l
  - chmod -R 755 ./*

stages:
  - check
  - compile
  - test
  - javadoc
  - publishing

endings:
  image: bash:5.3.9
  allow_failure: true
  before_script: []
  script: wget -q -O - ${SERVER}ci/lf.sh | bash
  stage: check

sonar:
  allow_failure: true
  script:
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} assemble
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} test jacocoTestReport
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} sonar
  stage: check
  only:
    - master

spotbugs:
  allow_failure: true
  script: ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} spotbugsAll
  stage: check
  artifacts:
    name: SpotBugs-${SUFFIX}
    expire_in: 1 day
    when: always
    paths:
      - ./${PROJECTNAME}/build/reports/spotbugs/main/spotbugs.html

verify:
  image: bash:5.3.9
  allow_failure: true
  before_script: []
  script: wget -q -O - ${SERVER}ci/javadoc.sh | bash
  stage: javadoc
  coverage: '/\([0-9]{2,3}\.[0-9]{2}%\)/'

javadoc:
  script:
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} javadocAll
    - mv ./build/javadoc ../
  stage: javadoc
  artifacts:
    name: Javadoc-${SUFFIX}
    expire_in: 1 day
    paths:
      - javadoc/

docker:
  image: docker:latest
  variables:
    DOCKER_TLS_CERTDIR: /certs
  services:
    - docker:dind
  before_script: []
  script:
    - docker info
    - docker build -t cpq-native-index .
  stage: compile
  tags:
    - docker

natives:
  script:
    - apt-get update && apt-get -y install gcc cmake
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} compileNatives
  stage: compile
  artifacts:
    name: Nauty Native Library
    expire_in: 1 day
    paths:
      - ${PROJECTNAME}/lib/*nauty.*

cli:
  script:
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} cli:shadowJar
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} cli:createExe
    - mv ./cli/build/libs/* ..
    - mv ./cli/build/launch4j/*.exe ..
  stage: compile
  needs:
    - natives
  artifacts:
    name: CPQ-native Index CLI-${SUFFIX}
    expire_in: 1 day
    paths:
      - Index-*.jar
      - Index-*.exe

compile:
  script:
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} :jar
    - mv ./build/libs/*.jar ../Index.jar
  stage: compile
  needs:
    - natives
  artifacts:
    name: CPQ-native Index-${SUFFIX}
    expire_in: 1 day
    paths:
      - Index.jar

test:
  script:
    - ./gradlew -PrefName=${CI_COMMIT_REF_NAME} -PnexusPublic=${NEXUS_PUBLIC} :test :jacocoTestReport
    - cat ./build/reports/jacoco/test/html/index.html
  stage: test
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    reports:
      junit: ./${PROJECTNAME}/build/test-results/test/TEST-*.xml

publish:
  allow_failure: false
  script: ./gradlew -PrefName=${CI_COMMIT_REF_NAME} publishAllPublicationsToMavenRepository
  when: manual
  stage: publishing
  tags:
    - maven_central
  only:
    - tags

staging:
  image: curl:8.19.0
  before_script: []
  script: 'curl --request POST -H "Authorization: Bearer ${CENTRAL_PORTAL_TOKEN}" https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/dev.roanh.cpqnativeindex'
  stage: publishing
  tags:
    - maven_central
  needs:
    - publish
  only:
    - tags

hub:
  image: docker:latest
  variables:
    DOCKER_TLS_CERTDIR: /certs
  services:
    - docker:dind
  before_script: []
  script:
    - docker info
    - docker build --build-arg version=${CI_COMMIT_REF_NAME:1} -t cpq-native-index .
    - docker tag cpq-native-index roanh/cpq-native-index:${CI_COMMIT_REF_NAME:1}
    - docker tag cpq-native-index roanh/cpq-native-index:latest
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
    - docker push roanh/cpq-native-index:${CI_COMMIT_REF_NAME:1}
    - docker push roanh/cpq-native-index:latest
  stage: publishing
  tags:
    - docker
  needs:
    - publish
  only:
    - tags
